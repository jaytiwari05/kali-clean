# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# NOTE: i3blocks 1.5 no longer ships the helper scripts that used to live in
# /usr/share/i3blocks/. Every block below uses a self-contained inline command,
# so nothing extra needs to be installed. Icon glyphs need a Nerd Font.

# Global properties
separator_block_width=15
separator=false
markup=none

# CPU usage
[cpu_usage]
label= CPU 
command=S1=$(awk '/^cpu /{print $2+$3+$4+$5+$6+$7+$8, $5}' /proc/stat); sleep 0.4; S2=$(awk '/^cpu /{print $2+$3+$4+$5+$6+$7+$8, $5}' /proc/stat); echo "$S1 $S2" | awk '{printf "%.0f%%", (1-($4-$2)/($3-$1))*100}'; echo
interval=5

# Target / attack machine IP (from /etc/attmachine.txt)
[attmachine]
label= 
color=#FF5555
command=cat /etc/attmachine.txt 2>/dev/null
interval=10

# Memory usage (used / total)
[memory]
label= RAM 
command=free -h | awk '/^Mem:/ {gsub(/i/,"",$3); gsub(/i/,"",$2); print $3"/"$2}'
interval=10

# Disk usage (free space on /)
[disk]
label= Disk 
command=df -h / | awk 'NR==2 {print $4}'
interval=240

# Network bandwidth (down / up over 1s) on the default-route interface
[bandwidth]
label= 
command=I=$(ip route | awk '/^default/{print $5; exit}'); [ -z "$I" ] && { echo "no net"; exit; } ; R1=$(cat /sys/class/net/$I/statistics/rx_bytes); T1=$(cat /sys/class/net/$I/statistics/tx_bytes); sleep 1; R2=$(cat /sys/class/net/$I/statistics/rx_bytes); T2=$(cat /sys/class/net/$I/statistics/tx_bytes); awk -v r=$((R2-R1)) -v t=$((T2-T1)) 'BEGIN{printf "%.0fK %.0fK", r/1024, t/1024}'; echo
interval=5

# Network interface IP (tun0 VPN if connected, else active interface)
[iface]
label= 
color=#3BB92D
command=IP=$(ip -4 -o addr show tun0 2>/dev/null | awk '{print $4}' | cut -d/ -f1); [ -z "$IP" ] && IP=$(ip route get 1.1.1.1 2>/dev/null | awk '{print $7; exit}'); echo "${IP:-down}"
interval=10

# Date Time
[time]
label= 
command=date '+%A, %d %B %Y %H:%M:%S '
interval=1
